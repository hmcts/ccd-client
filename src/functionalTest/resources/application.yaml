spring:
  application:
    name: 'Core case data client'
  # https://github.com/spring-cloud/spring-cloud-openfeign/issues/847
  cloud:
    mvc:
      token-relay:
        enabled: false

idam:
  s2s-auth:
    totp_secret: ${IDAM_S2S_AUTH_TOTP_SECRET:AAAAAAAAAAAAAAAA}
    microservice: ${IDAM_S2S_AUTH_MICROSERVICE:ccd_gateway}
    url: ${IDAM_S2S_AUTH_URL:http://localhost:4502}
  api:
    url: ${IDAM_API_URL:http://localhost:5000}
  client:
    redirect_uri: ${IDAM_CLIENT_REDIRECT_URI:http://localhost:3451/oauth2redirect}
    id: ${IDAM_CLIENT_ID:ccd_gateway}
    secret: ${IDAM_CLIENT_SECRET:12345678}

core_case_data:
  api:
    url: ${CORE_CASE_DATA_API_URL:http://localhost:4452}

feign:
  httpclient:
    enabled: true
  client:
    config:
      default:
        loggerLevel: 'full'